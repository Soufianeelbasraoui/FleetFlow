services:
  app:
    build: .
    ports:
      - "8080:8080"
    container_name: fleetflow-app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/fleetflow?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: fleetflow-db
    restart: always
    environment:
      - MYSQL_DATABASE=fleetflow
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: